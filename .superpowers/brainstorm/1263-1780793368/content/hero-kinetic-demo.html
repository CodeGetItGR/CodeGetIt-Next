<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kinetic Hero — Chevron Choreography</title>
<style>
  :root {
    --bg: #fafafa;
    --ink: #0f172a;
    --muted: #94a3b8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Outfit', system-ui, -apple-system, sans-serif;
    overflow: hidden;
  }

  /* subtle brand atmosphere */
  .atmos {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(60% 50% at 14% 40%, rgba(20,184,166,0.06) 0%, transparent 62%),
      radial-gradient(50% 45% at 88% 70%, rgba(246,137,86,0.05) 0%, transparent 64%);
  }

  .stage {
    position: relative;
    height: 100dvh;
    width: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow: hidden;
  }

  /* ── The drifting chevrons (behind the type) ── */
  .chev {
    position: absolute;
    top: 50%;
    will-change: transform;
    z-index: 1;
    opacity: 0.9;
  }
  .chev svg { display: block; height: 46vh; width: auto; }

  /* Left teal chevron — its own slow independent loop */
  .chev--left {
    left: 50%;
    animation: driftLeft 26s ease-in-out infinite;
  }
  /* Right orange chevron — different duration → they're never in lockstep */
  .chev--right {
    left: 50%;
    animation: driftRight 34s ease-in-out infinite;
  }

  /* paths cross near center mid-cycle, slide past, rotate slowly */
  @keyframes driftLeft {
    0%   { transform: translate(-118%, -64%) rotate(-12deg) scale(1.00); }
    25%  { transform: translate( -10%, -38%) rotate(  6deg) scale(1.10); }
    50%  { transform: translate(  70%, -60%) rotate( 18deg) scale(0.96); }
    75%  { transform: translate(   4%, -86%) rotate( -4deg) scale(1.06); }
    100% { transform: translate(-118%, -64%) rotate(-12deg) scale(1.00); }
  }
  @keyframes driftRight {
    0%   { transform: translate(  60%, -42%) rotate( 14deg) scale(1.04); }
    25%  { transform: translate( -28%, -70%) rotate( -8deg) scale(0.94); }
    50%  { transform: translate(-104%, -40%) rotate(-20deg) scale(1.12); }
    75%  { transform: translate( -18%, -22%) rotate(  4deg) scale(1.00); }
    100% { transform: translate(  60%, -42%) rotate( 14deg) scale(1.04); }
  }

  /* ── Full-width kinetic headline ── */
  .headline {
    position: relative;
    z-index: 2;
    width: 100%;
    padding: 0 5vw;
    font-weight: 800;
    letter-spacing: -0.045em;
    line-height: 0.96;
    font-size: clamp(48px, 11vw, 168px);
    text-wrap: balance;
    mix-blend-mode: normal;
  }
  .headline .line { display: block; }
  .headline .dim { color: #cbd5e1; }
  .headline .ink { color: #0f172a; }

  /* faint front-echo of each chevron so they read as passing THROUGH the type */
  .echo {
    position: absolute; top: 50%; left: 50%;
    z-index: 3; pointer-events: none;
    mix-blend-mode: multiply; opacity: 0.10;
  }
  .echo svg { display: block; height: 46vh; width: auto; }
  .echo--left  { animation: driftLeft 26s ease-in-out infinite; }
  .echo--right { animation: driftRight 34s ease-in-out infinite; }

  .caption {
    position: fixed; left: 0; right: 0; bottom: 22px;
    text-align: center; z-index: 5;
    font-size: 13px; letter-spacing: 0.02em; color: var(--muted);
  }
  .caption b { color: #0f766e; font-weight: 600; }

  @media (prefers-reduced-motion: reduce) {
    .chev, .echo { animation: none; }
  }
</style>
</head>

      <stop offset=".66" stop-color="#008092"/><stop offset=".94" stop-color="#1cbcc0"/>

    </svg>
  </div>

  <!-- full-width headline -->
