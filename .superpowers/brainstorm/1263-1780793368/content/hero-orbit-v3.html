<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kinetic Hero v3 — 3D Chevron Orbit</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: #fafafa;
    color: #0f172a;
    font-family: 'Outfit', system-ui, -apple-system, sans-serif;
    overflow: hidden;
  }
  .atmos {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(55% 50% at 20% 42%, rgba(20,184,166,0.06) 0%, transparent 62%),
      radial-gradient(50% 45% at 82% 64%, rgba(246,137,86,0.045) 0%, transparent 64%);
  }

  /* 3D scene */
  .scene {
    position: relative;
    height: 100dvh; width: 100%;
    display: flex; align-items: center; justify-content: center;
    perspective: 1100px;
  }
  .world {
    position: relative;
    width: 100%;
    transform-style: preserve-3d;
    display: flex; align-items: center; justify-content: center;
  }

  /* headline lives on the z=0 plane → its glyphs occlude chevrons orbiting behind */
  .headline {
    transform: translateZ(0);
    text-align: center;
    padding: 0 8vw;
    font-weight: 800; letter-spacing: -0.04em; line-height: 1.0;
    font-size: clamp(44px, 8.2vw, 116px);
  }
  .headline .dim { color: #cbd5e1; }
  .headline .ink { color: #0f172a; }

  /* the two orbiting chevrons */
  .chev {
    position: absolute; top: 50%; left: 50%;
    --r: 360px;            /* orbit radius (depth + horizontal swing) */
    will-change: transform, opacity;
  }
  .chev svg { display: block; height: 20vh; width: auto; }

  .chev--teal   { animation: orbit 16s linear infinite; }
  .chev--orange { animation: orbit 16s linear infinite; animation-delay: -8s; } /* 180° out of phase */

  /* rotateY → translateZ → counter-rotateY keeps each chevron facing us while it
     circles the headline: near side = big & in front, far side = small & behind. */
  @keyframes orbit {
    0%   { transform: translate(-50%,-50%) rotateY(0deg)   translateZ(var(--r)) rotateY(0deg)    rotateZ(0deg);   opacity: 1;   }
    25%  { transform: translate(-50%,-54%) rotateY(90deg)  translateZ(var(--r)) rotateY(-90deg)  rotateZ(6deg);   opacity: .82; }
    50%  { transform: translate(-50%,-50%) rotateY(180deg) translateZ(var(--r)) rotateY(-180deg) rotateZ(0deg);   opacity: .42; }
    75%  { transform: translate(-50%,-46%) rotateY(270deg) translateZ(var(--r)) rotateY(-270deg) rotateZ(-6deg);  opacity: .82; }
    100% { transform: translate(-50%,-50%) rotateY(360deg) translateZ(var(--r)) rotateY(-360deg) rotateZ(0deg);   opacity: 1;   }
  }

  .caption {
    position: fixed; left: 0; right: 0; bottom: 22px; text-align: center;
    z-index: 5; font-size: 13px; color: #94a3b8;
  }
  .caption b { color: #0f766e; font-weight: 600; }

  /* Emil's rule: reduced motion = no movement, rest in the framing position */
  @media (prefers-reduced-motion: reduce) {
    .chev--teal   { animation: none; transform: translate(calc(-50% - 360px), -50%); }
    .chev--orange { animation: none; transform: translate(calc(-50% + 360px), -50%); }
  }
</style>
</head>
<body>
<div class="atmos"></div>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <linearGradient id="teal" x1="-5.66" y1="-5.13" x2="215" y2="219.64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1cbcc0"/><stop offset=".18" stop-color="#1cb8bc"/>
      <stop offset=".66" stop-color="#008092"/><stop offset=".94" stop-color="#1cbcc0"/>
    </linearGradient>
    <linearGradient id="orange" x1="48.31" y1="-54.25" x2="284.19" y2="181.63" gradientUnits="userSpaceOnUse">
      <stop offset=".47" stop-color="#fff568"/><stop offset=".99" stop-color="#f68956"/>
    </linearGradient>
  </defs>
</svg>

<div class="scene">
  <div class="world">

    <div class="chev chev--teal" aria-hidden="true">
      <svg viewBox="95 29 65 99" xmlns="http://www.w3.org/2000/svg">
        <path fill="url(#teal)" d="M133.14,81.42c-1.5-1.5-1.5-3.94,0-5.44l24.53-24.53c1.71-1.71,1.71-4.49,0-6.2l-14.22-14.22c-1.71-1.71-4.49-1.71-6.2,0l-25.45,25.45.04.04-14.94,14.94c-4.05,4.05-4.05,10.62,0,14.67l10.68,10.68c.08.05.16.11.24.15l29.06,29.06c1.71,1.71,4.49,1.71,6.2,0l14.22-14.22c1.71-1.71,1.71-4.49,0-6.2l-24.16-24.16Z"/>
      </svg>
    </div>

    <div class="chev chev--orange" aria-hidden="true">
      <svg viewBox="162 29 66 100" xmlns="http://www.w3.org/2000/svg">
        <path fill="url(#orange)" d="M214.6,96.62l10.5-10.5c4.05-4.05,4.05-10.62,0-14.67l-10.96-10.96s-.04-.03-.07-.04l-28.93-28.93c-1.71-1.71-4.49-1.71-6.2,0l-14.22,14.22c-1.71,1.71-1.71,4.49,0,6.2l24.03,24.03c1.5,1.5,1.5,3.94,0,5.44l-24.82,24.82c-1.71,1.71-1.71,4.49,0,6.2l14.22,14.22c1.71,1.71,4.49,1.71,6.2,0l29.71-29.71c.18-.1.36-.21.53-.33Z"/>
      </svg>
    </div>

    <h1 class="headline">
      <span class="dim">placeholder</span> <span class="ink">headline</span>
    </h1>

  </div>
</div>

<div class="caption">v3 — real 3D orbit. Teal <b>&lt;</b> + orange <b>&gt;</b> circle the words 180&deg; apart: near side big &amp; in front, far side small &amp; <b>behind the letters</b>. Linear, 16s, runs off the main thread.</div>
</body>
</html>
